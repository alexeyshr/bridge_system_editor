name: Bug Report
description: Report a defect with repro steps and impact
title: "[BUG] "
labels: ["type:bug", "status:triage"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short bug summary.
      placeholder: "What is broken?"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Numbered steps to reproduce.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs / Screenshots / Notes
    validations:
      required: false
