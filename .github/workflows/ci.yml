name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  spec-check:
    name: Spec Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR body contains spec link
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request && context.payload.pull_request.body) || "";
            const hasSpecHeading = /##\s*Spec Link/i.test(body);
            const hasFeaturesPath = /features\/[^\s)]+/i.test(body);
            if (!hasSpecHeading || !hasFeaturesPath) {
              core.setFailed(
                "PR must include '## Spec Link' section and a path under 'features/...'."
              );
            }

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Run lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Run typecheck
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Run build
        run: |
          for i in 1 2 3; do
            npm run build && exit 0
            echo "Build attempt $i failed"
            if [ "$i" -lt 3 ]; then sleep 15; fi
          done
          echo "Build failed after 3 attempts"
          exit 1
